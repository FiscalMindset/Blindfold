<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a16"/>
      <stop offset="1" stop-color="#070710"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#3d7bfd" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#3d7bfd" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#22223a" stroke-width="2"/>

  <!-- brand: 🛡️ emoji (matches the site) -->
  <g transform="translate(70,52)">
    <text x="0" y="30" font-size="33">🛡️</text>
    <text x="47" y="31" fill="#eef0fa" font-size="29" font-weight="700">Blindfold</text>
  </g>

  <!-- LEFT column: headline (3 short lines) -->
  <text x="70" y="196" fill="#eef0fa" font-size="57" font-weight="800">Your AI agent can&#39;t</text>
  <text x="70" y="262" fill="#eef0fa" font-size="57" font-weight="800">leak the API key</text>
  <text x="70" y="328" fill="#eef0fa" font-size="57" font-weight="800"><tspan fill="#5b8cff">it never had.</tspan></text>

  <!-- sub -->
  <text x="70" y="386" fill="#9a9ab8" font-size="25">Seal your key inside an Intel TDX enclave.</text>
  <text x="70" y="420" fill="#9a9ab8" font-size="25">The agent uses it — but never sees it.</text>

  <!-- mono chip -->
  <g transform="translate(70,452)">
    <rect width="600" height="54" rx="12" fill="#06060d" stroke="#22223a"/>
    <text x="20" y="35" font-family="monospace" font-size="21" fill="#c9d4ff">Authorization: Bearer <tspan fill="#f0b429">__BLINDFOLD__</tspan></text>
  </g>

  <!-- footer badges -->
  <text x="70" y="576" font-size="21" fill="#66668a">npm  ·  MIT  ·  Terminal 3  ·  Intel TDX  ·  Open source</text>

  <!-- RIGHT column: mini flow diagram (the real path) -->
  <g transform="translate(800,150)">
    <!-- node 1: agent -->
    <rect x="0" y="0" width="330" height="80" rx="14" fill="#0b0b18" stroke="#ff6b63" stroke-opacity="0.4"/>
    <text x="20" y="49" font-size="29">🤖</text>
    <text x="62" y="35" fill="#eef0fa" font-size="20" font-weight="700">AI Agent</text>
    <text x="62" y="60" fill="#9a9ab8" font-family="monospace" font-size="14">holds __BLINDFOLD__</text>

    <!-- arrow 1→2 -->
    <line x1="165" y1="84" x2="165" y2="118" stroke="#5b8cff" stroke-width="2.5" stroke-dasharray="6 5"/>
    <path d="M159 114 L171 114 L165 124 Z" fill="#5b8cff"/>

    <!-- node 2: enclave -->
    <rect x="0" y="128" width="330" height="96" rx="14" fill="#0b0b18" stroke="#3d7bfd" stroke-opacity="0.55"/>
    <text x="20" y="182" font-size="29">🔐</text>
    <text x="62" y="163" fill="#eef0fa" font-size="20" font-weight="700">Intel TDX enclave</text>
    <text x="62" y="188" fill="#9a9ab8" font-size="14">swap sentinel → real key</text>
    <text x="62" y="208" fill="#9a9ab8" font-size="14">memory-encrypted · attested</text>

    <!-- arrow 2→3 -->
    <line x1="165" y1="228" x2="165" y2="262" stroke="#3fd07a" stroke-width="2.5" stroke-dasharray="6 5"/>
    <path d="M159 258 L171 258 L165 268 Z" fill="#3fd07a"/>

    <!-- node 3: api -->
    <rect x="0" y="272" width="330" height="80" rx="14" fill="#0b0b18" stroke="#3fd07a" stroke-opacity="0.5"/>
    <text x="20" y="321" font-size="29">🌐</text>
    <text x="62" y="307" fill="#eef0fa" font-size="20" font-weight="700">Upstream API</text>
    <text x="62" y="332" fill="#9a9ab8" font-size="14">gets the call — not the key</text>
  </g>
</svg>
