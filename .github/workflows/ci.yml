name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run demo
        env:
          BLINDFOLD_MOCK: "1"
        run: npm run demo

      - name: Run test battery
        env:
          BLINDFOLD_MOCK: "1"
        run: npm run test:report
