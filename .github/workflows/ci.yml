name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run demo
        env:
          BLINDFOLD_MOCK: "1"
        run: npm run demo

      - name: Run test battery
        env:
          BLINDFOLD_MOCK: "1"
        run: npm run test:report

      - name: Provider registry tests
        run: npm run test:providers

  contract:
    name: Enclave contract (build + auth vectors)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust + wasm32-wasip2 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Unit-test in-enclave auth (SigV4 + Basic vectors)
        run: cargo test --manifest-path contract/auth-tests/Cargo.toml

      - name: Build enclave contract (wasm32-wasip2)
        run: cargo build --manifest-path contract/Cargo.toml --target wasm32-wasip2 --release
